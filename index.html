<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Infrastructure Canary Terminal v9.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 text-stone-200 p-8">
    <header class="mb-8">
        <h1 class="text-3xl font-black text-white">PHYSICAL INFRASTRUCTURE CANARY v9.5</h1>
        <p class="text-stone-500 font-mono text-sm">Three-Tiered Divergence Monitoring (Foundation -> Fabric -> Velocity)</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="dashboard">
        <!-- Tier 1 -->
        <div class="bg-stone-900 p-6 rounded-2xl border border-stone-800">
            <h2 class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-4">Tier 1: Foundation (Physical)</h2>
            <div id="t1-list" class="space-y-3"></div>
        </div>
        <!-- Tier 1.5 -->
        <div class="bg-stone-900 p-6 rounded-2xl border border-stone-800">
            <h2 class="text-xs font-bold text-amber-400 uppercase tracking-widest mb-4">Tier 1.5: Compute & Fabric</h2>
            <div id="t15-list" class="space-y-3"></div>
        </div>
        <!-- Tier 2 -->
        <div class="bg-stone-900 p-6 rounded-2xl border border-stone-800">
            <h2 class="text-xs font-bold text-fuchsia-400 uppercase tracking-widest mb-4">Tier 2: Velocity (Operations)</h2>
            <div id="t2-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // Placeholder data representing the logic calculated by Canary Monitor
        const mockData = {
            "CEG": {price: 345.2, change: 1.2}, "VRT": {price: 120.5, change: 0.8},
            "ETN": {price: 355.0, change: 0.5}, "EQIX": {price: 850.0, change: -1.2}, // EQIX不穏
            "SMCI": {price: 680.0, change: -2.1}, "ANET": {price: 410.0, change: 1.1},
            "CRWV": {price: 28.5, change: -3.5}, "NBIS": {price: 12.0, change: -1.0}
        };

        function render() {
            const tiers = {
                't1': ['CEG', 'VRT', 'ETN', 'EQIX'],
                't15': ['SMCI', 'ANET'],
                't2': ['CRWV', 'NBIS']
            };

            for (const [id, tickers] of Object.entries(tiers)) {
                const container = document.getElementById(id + '-list');
                tickers.forEach(t => {
                    const d = mockData[t];
                    container.innerHTML += `
                        <div class="flex justify-between p-3 bg-stone-950 rounded-lg hover:border hover:border-stone-700 transition">
                            <span class="font-bold">${t}</span>
                            <span class="${d.change >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-mono">
                                ${d.change > 0 ? '+' : ''}${d.change}%
                            </span>
                        </div>`;
                });
            }
        }
        render();
    </script>
</body>
</html>
