name: CanaryInTheGrid v3.6 Live Monitor

on:
  schedule:
    - cron: '0 21 * * 1-5'  # 月〜金 UTC 21:00 (火〜土 JST 6:00) に限定実行
  workflow_dispatch:      # ★これがないとRun workflowボタンが消える！
  
jobs:
  execute-canary:
    runs-on: ubuntu-latest

    steps:
      # Node.js 24 環境へネイティブ対応した最新のメジャーバージョンへアップデート
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Quant Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth google-cloud-firestore

      - name: Run Spatio-Temporal Extraction Engine
        env:
          GCP_SHEET_ID: ${{ secrets.GCP_SHEET_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python canary_monitor.py
