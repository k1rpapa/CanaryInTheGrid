name: CanaryInTheGrid Daily Monitor

on:
  schedule:
    # 日本時間の毎朝 06:00 (UTC 21:00) に実行
    - cron: '0 21 * * *'
  
  # GitHub画面からの手動実行用トリガー
  workflow_dispatch:

jobs:
  run-canary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7  # ← Node.js 24完全対応の最新版 (v7)

      - name: Set up Python
        uses: actions/setup-python@v6  # ← Node.js 24完全対応の最新版 (v6)
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Canary Monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python canary_monitor.py
