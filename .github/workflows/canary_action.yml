name: CanaryInTheGrid v5.1 Live Monitor

on:
  schedule:
    - cron: '0 21 * * *'  # 毎朝JST 6:00 (UTC 21:00) にバッチ実行
  workflow_dispatch:      # GitHub画面からの手動実行ボタン

jobs:
  execute-canary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Quant Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth google-cloud-firestore cloudscraper

      - name: Run Spatio-Temporal Extraction Engine
        env:
          GCP_SHEET_ID: ${{ secrets.GCP_SHEET_ID }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python canary_monitor.py
