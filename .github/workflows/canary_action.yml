name: CanaryInTheGrid Daily Monitor

on:
  schedule:
    # 日本時間の毎朝 06:00 (UTC 21:00) に実行
    - cron: '0 21 * * *'
  
  # GitHub画面からの手動実行用トリガー
  workflow_dispatch:

jobs:
  run-canary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ← 最新版 (v4) に換装済み

      - name: Set up Python
        uses: actions/setup-python@v5  # ← 最新版 (v5) に換装済み
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Canary Monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python canary_monitor.py
